name: Release

# Tag-driven release: vX.Y.Z publishes docxengine to PyPI with trusted publishing.
# See RELEASING.md.
#
# Publishing is deferred, so this workflow is MANUAL-ONLY (workflow_dispatch):
# pushing a version tag no longer auto-attempts a publish. Before re-enabling the
# tag trigger, configure PyPI trusted publishing, then restore:
#   on:
#     push:
#       tags: ["v*.*.*"]

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # PyPI trusted publishing

jobs:
  verify:
    name: Full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install engine
        run: pip install -e "python[dev]"
      - name: Python tests
        run: pytest python

  publish-python:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build python
      - name: Publish (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  github-release:
    name: Draft GitHub release
    needs: [publish-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release from changelog
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

name: Release

# Tag-driven release: vX.Y.Z publishes docxengine (PyPI) and @docxengine/core
# (npm) in lockstep, with provenance. See RELEASING.md.
#
# Publishing is deferred, so this workflow is MANUAL-ONLY (workflow_dispatch):
# pushing a version tag no longer auto-attempts a PyPI/npm publish. Before
# re-enabling the tag trigger, configure PyPI trusted publishing and the
# NPM_TOKEN secret, then restore:
#   on:
#     push:
#       tags: ["v*.*.*"]

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # PyPI trusted publishing + npm provenance

jobs:
  verify:
    name: Full test + conformance matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install engines
        run: |
          pip install -e "python[dev]"
          pnpm install --frozen-lockfile
          pnpm --dir js build
      - name: Python tests
        run: pytest python
      - name: JS tests
        run: pnpm --dir js test
      - name: Conformance parity
        run: python conformance/harness/run.py

  publish-python:
    name: Publish to PyPI
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build python
      - name: Publish (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist

  publish-npm:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir js build
      - run: pnpm --dir js publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Draft GitHub release
    needs: [publish-python, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create release from changelog
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

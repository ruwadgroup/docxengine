name: CodeQL

# Code-scanning upload requires a public repo (or GitHub Advanced Security on
# private repos), so the job is gated on visibility — it activates automatically
# when the repository goes public. Re-add a cron trigger then if desired.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
